<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Romântico</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url("capa.jpg") center/cover no-repeat;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    backdrop-filter:blur(15px);
    background:rgba(0,0,0,.35);
}

.player{
    position:relative;
    width:850px;
    max-width:95%;
    padding:30px;
    border-radius:35px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.08);
    border:2px solid rgba(255,255,255,.15);
    box-shadow:0 0 30px rgba(255,255,255,.15);
}

.content{
    display:flex;
    gap:35px;
}

.cover{
    width:310px;
    height:310px;
    border-radius:20px;
    overflow:hidden;
    border:2px solid rgba(255,255,255,.2);
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.info{
    flex:1;
    color:white;
    display:flex;
    flex-direction:column;
}

.title{
    font-size:50px;
    font-weight:700;
    margin-top:10px;
}

.artist{
    font-size:28px;
    opacity:.9;
    margin-bottom:30px;
}

.progress-container{
    width:100%;
}

.progress{
    width:100%;
    appearance:none;
    height:6px;
    border-radius:10px;
    background:rgba(255,255,255,.2);
    cursor:pointer;
}

.progress::-webkit-slider-thumb{
    appearance:none;
    width:18px;
    height:18px;
    border-radius:50%;
    background:white;
}

.time{
    display:flex;
    justify-content:space-between;
    margin-top:8px;
    color:#ddd;
    font-size:24px;
}

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
    margin-top:45px;
}

.controls button{
    border:none;
    background:none;
    color:white;
    cursor:pointer;
    transition:.3s;
}

.controls button:hover{
    transform:scale(1.15);
}

.play-btn{
    font-size:70px;
}

.side-btn{
    font-size:50px;
}

.volume{
    display:flex;
    align-items:center;
    gap:15px;
    margin-top:50px;
}

.volume input{
    flex:1;
    appearance:none;
    height:5px;
    background:rgba(255,255,255,.2);
    border-radius:20px;
}

.volume input::-webkit-slider-thumb{
    appearance:none;
    width:18px;
    height:18px;
    border-radius:50%;
    background:white;
}

.bottom-line{
    width:140px;
    height:5px;
    border-radius:20px;
    background:white;
    margin:25px auto 0;
    opacity:.9;
}

@media(max-width:900px){

.content{
    flex-direction:column;
    align-items:center;
}

.cover{
    width:250px;
    height:250px;
}

.title{
    font-size:35px;
}

.artist{
    font-size:22px;
}
}
</style>
</head>
<body>

<div class="player">

    <div class="content">

        <div class="cover">
            <img src="capa.jpg" alt="">
        </div>

        <div class="info">

            <div class="title">Aliança</div>
            <div class="artist">Victor & Leo</div>

            <div class="progress-container">

                <input type="range" id="progress" class="progress" value="0">

                <div class="time">
                    <span id="current">0:00</span>
                    <span id="duration">0:00</span>
                </div>

            </div>

            <div class="controls">

                <button class="side-btn">⏮</button>

                <button id="playBtn" class="play-btn">
                    ⏸
                </button>

                <button class="side-btn">⏭</button>

            </div>

            <div class="volume">

                🔉

                <input
                    type="range"
                    min="0"
                    max="1"
                    step="0.01"
                    value="1"
                    id="volume"
                >

                🔊

            </div>

        </div>

    </div>

    <div class="bottom-line"></div>

</div>

<audio id="audio" src="musica.mp3"></audio>

<script>

const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const progress = document.getElementById("progress");
const volume = document.getElementById("volume");

const current = document.getElementById("current");
const duration = document.getElementById("duration");

function formatTime(seconds){

    const min = Math.floor(seconds/60);
    const sec = Math.floor(seconds%60);

    return `${min}:${sec < 10 ? "0"+sec : sec}`;
}

audio.addEventListener("loadedmetadata",()=>{

    progress.max = audio.duration;
    duration.textContent = formatTime(audio.duration);

});

audio.addEventListener("timeupdate",()=>{

    progress.value = audio.currentTime;
    current.textContent = formatTime(audio.currentTime);

});

progress.addEventListener("input",()=>{

    audio.currentTime = progress.value;

});

volume.addEventListener("input",()=>{

    audio.volume = volume.value;

});

let playing = false;

playBtn.addEventListener("click",()=>{

    if(!playing){

        audio.play();
        playBtn.innerHTML = "⏸";
        playing = true;

    }else{

        audio.pause();
        playBtn.innerHTML = "▶";
        playing = false;

    }

});

audio.addEventListener("ended",()=>{

    playBtn.innerHTML = "▶";
    playing = false;

});

</script>

</body>
</html>
