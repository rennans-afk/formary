<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For you</title>
<style>
@import url(https://fonts.googleapis.com/css?family=Shadows+Into+Light);

@-webkit-keyframes throb{
  0%{
    -webkit-transform: scale(1);
	}
  35%{
	  -webkit-transform: scale(1.2);
	}
	85%{
	  -webkit-transform: scale(1);
	}		
}

html {
  display: table;
  width: 100%;
  height: 100vmin;
  table-layout: fixed;
}

body {


  display: table-cell;
  vertical-align: bottom;
  font-family: Shadows Into Light;
  color: #fcfafa;

  background-image:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
    url("fundo.jpeg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

.wrapper {
  width: 90vmin;
  height: 90vmin;
  position: relative;
  margin: 5vmin auto;
}

div.throb {
  -webkit-animation: throb 1.5s infinite;
  animation: throb 1.5s infinite;
  animation-delay: 0.8s;
}

input[type="checkbox"] {
  display: none !important;
}

input[type="checkbox"] + label {
  width: 30vmin; height: 30vmin;
  line-height: 30vmin;
  display: inline-block;
  position: absolute;
  font-size: 30vmin;
  text-align: center;
  transition: all 1s ease;
}

label {
  text-shadow: 3vmin 3vmin 10vmin rgba(0,0,0,0.5);
}
  label:hover {
    color: #cf1313;
    cursor: pointer;
  }

#ck1 + label,
#ck2 + label {
  border-radius: 50%;
  top: 0;
}

#ck1:checked + label,
#ck2:checked + label,
#ck3:checked + label {
  background: #cf1313;
  font-size: 0;
  transition: all 1s ease;
}

#ck1 + label {
  left: 0;
}

#ck2 + label {
  right: 10vmin;
}

#ck1:checked + label,
#ck2:checked + label {
  width: 54vmin; height: 54vmin;
  border-radius: 50%;
  line-height: 54vmin;
}

#ck2:checked + label {
  right: 0;
}

#ck3 + label {
  bottom: 5vmin; left: 50%;
  margin: 0 -9vmin;
}

#ck3:checked + label {
  width: 49.5vmin; height: 49.5vmin;
  bottom: 17.28vmin; left: 29.16vmin;
  transform: rotate(45deg);
  line-height: 4.86vmin;
}

span {
  display: inline-block;
  text-align: left;
  position: absolute;
  bottom: 0vmin; left: 0vmin;
  margin-bottom: -3vmin;
  font-size: 6vmin;
  color: #999;
}
/* Pétalas de rosa */

.petal {
  position: fixed;
  top: -50px;
  pointer-events: none;
  z-index: 9999;
  font-size: 24px;
  animation: fall linear forwards;
}

@keyframes fall {

  0% {
    transform:
      translateY(0)
      translateX(0)
      rotate(0deg);
    opacity: 0;
  }

  10% {
    opacity: 1;
  }

  100% {
    transform:
      translateY(110vh)
      translateX(var(--drift))
      rotate(720deg);
    opacity: 0;
  }

}
#musicPlayer{
  position:fixed;
  top:20px;
  right:20px;

  width:320px;
  padding:10px;

  display:flex;
  align-items:center;
  gap:12px;

  background:rgba(0,0,0,.75);
  backdrop-filter:blur(8px);

  border-radius:15px;

  box-shadow:0 0 15px rgba(0,0,0,.3);

  cursor:pointer;

  z-index:99999;
}

#musicPlayer img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:10px;
}

.musicInfo{
  flex:1;
}

.musicTitle{
  color:white;
  font-size:18px;
  font-weight:bold;
}

.musicArtist{
  color:#ccc;
  font-size:14px;
}

#playIcon{
  color:white;
  font-size:28px;
  font-weight:bold;
}
</style>
</head>
<body>

<audio id="bgMusic">
    <source src="Aliança.opus" type="audio/ogg">
</audio>

<div id="musicPlayer" onclick="toggleMusic()">

    <img src="player.png" alt="Player">

    <div class="musicInfo">
        <div class="musicTitle">Aliança</div>
        <div class="musicArtist">Sua música ❤️</div>
    </div>

    <div id="playIcon">▶</div>

</div>
<br><br>
<form> 
<div class="wrapper">
  <input type="checkbox" id="ck1" onClick="check()"/>
  <label for="ck1">I</label>
  <input type="checkbox" id="ck2" onClick="check()"/>
  <label for="ck2">love</label>
  <input type="checkbox" id="ck3" onClick="check()"/>
  <label for="ck3">you</label>
  <span id="color"></span>
</div>
</form>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
function createPetal() {

  const petal = document.createElement("div");

  petal.className = "petal";

  /* Emoji de rosa */
  petal.innerHTML = "🌹";

  petal.style.left =
    Math.random() * window.innerWidth + "px";

  petal.style.fontSize =
    (18 + Math.random() * 30) + "px";

  petal.style.animationDuration =
    (5 + Math.random() * 4) + "s";

  petal.style.setProperty(
    "--drift",
    (Math.random() * 300 - 150) + "px"
  );

  document.body.appendChild(petal);

  setTimeout(() => {
    petal.remove();
  }, 40000);
}

function startRoseRain() {

  let count = 1;

  const rain = setInterval(() => {

    createPetal();

    count++;

    if (count >= 800) {

  clearInterval(rain);

  const music = document.getElementById("bgMusic");

 music.pause();
	music.currentTime = 0;

	document.getElementById("playIcon")
		.innerHTML = "▶";

}

  }, 150);

}

let rosesStarted = false;

function check() {

  if (
    document.forms[0].elements[0].checked &&
    document.forms[0].elements[1].checked &&
    document.forms[0].elements[2].checked
  ) {

    if (!$('.wrapper').hasClass('throb')) {
      $('.wrapper').addClass('throb');
    }

    if (!rosesStarted) {

      rosesStarted = true;

      const music =
	document.getElementById("bgMusic");

	music.play();

	document.getElementById("playIcon")
	.innerHTML = "⏸";

setTimeout(() => {

  startRoseRain();

}, 5000);

    }

  } else {

    if ($('.wrapper').hasClass('throb')) {
      $('.wrapper').removeClass('throb');
    }

    rosesStarted = false;

  }

}
	function toggleMusic(){

    const music =
      document.getElementById("bgMusic");

    const icon =
      document.getElementById("playIcon");

    if(music.paused){

        music.play();

        icon.innerHTML = "⏸";

    }else{

        music.pause();

        icon.innerHTML = "▶";

    }

}

</script>

</body>
</html>
