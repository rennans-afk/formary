<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Shadows Into Light',cursive;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    background:
    linear-gradient(
      rgba(0,0,0,.35),
      rgba(0,0,0,.35)
    ),
    url("fundo.jpeg");

    background-size:cover;
    background-position:center;
}

.wrapper{
    position:relative;
    width:400px;
    height:350px;
}

/* CORAÇÃO */

.circle{

    width:140px;
    height:140px;

    background:#202330;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;
    font-size:70px;

    position:absolute;

    transition:.8s;
}

.left{
    left:0;
    top:0;
}

.right{
    right:0;
    top:0;
}

.bottom{

    left:50%;
    bottom:0;

    transform:
    translateX(-50%)
    rotate(45deg);
}

.bottom span{
    transform:rotate(-45deg);
}

.active{
    background:#cf1313;
    color:transparent;
}

.left.active,
.right.active{

    width:190px;
    height:190px;
    border-radius:50%;
}

.bottom.active{

    width:180px;
    height:180px;

    transform:
    translateX(-50%)
    rotate(45deg);
}

.bottom.active span{
    opacity:0;
}

/* PLAYER */

.player{

    position:fixed;

    top:30px;
    right:30px;

    width:500px;
    height:220px;

    display:flex;

    padding:20px;

    border-radius:25px;

    backdrop-filter:blur(20px);

    background:
    rgba(255,255,255,.08);

    border:
    1px solid rgba(255,255,255,.15);

    box-shadow:
    0 8px 32px rgba(0,0,0,.35);
}

.cover{

    width:180px;
    height:180px;

    border-radius:20px;

    object-fit:cover;
}

.info{

    flex:1;

    padding-left:20px;

    color:white;
}

.title{

    font-size:34px;
    font-weight:bold;
}

.artist{

    font-size:22px;

    opacity:.8;
}

.progress{

    width:100%;
    margin-top:20px;
}

.controls{

    display:flex;

    justify-content:center;
    gap:30px;

    margin-top:25px;
}

.controls button{

    background:none;
    border:none;

    color:white;

    font-size:35px;

    cursor:pointer;
}

.time{

    display:flex;
    justify-content:space-between;

    color:white;

    margin-top:5px;
}

/* ROSAS */

.petal{

    position:fixed;

    top:-50px;

    z-index:9999;

    pointer-events:none;

    animation:fall linear forwards;
}

@keyframes fall{

    from{
        transform:translateY(0);
        opacity:1;
    }

    to{
        transform:translateY(110vh);
        opacity:0;
    }
}
    @keyframes throb{
    0%{
        transform:scale(1);
    }
    35%{
        transform:scale(1.15);
    }
    85%{
        transform:scale(1);
    }
}

.throb{
    animation:throb .5s infinite;
    animation-delay:.8s;
}
    

</style>
</head>

<body>

<audio id="bgMusic">
    <source src="Aliança.opus" type="audio/ogg">
</audio>

<div class="player">

    <img
      src="player.jpg"
      class="cover">

    <div class="info">

        <div class="title">
            Aliança
        </div>

        <div class="artist">
            Sua música ❤️
        </div>

        <input
        type="range"
        value="0"
        class="progress"
        id="progress">

        <div class="time">

            <span id="current">
                0:00
            </span>

            <span id="duration">
                0:00
            </span>

        </div>

        <div class="controls">

            <button
            onclick="toggleMusic()"
            id="playBtn">
                ▶
            </button>

        </div>

    </div>

</div>

<div class="wrapper">

    <div class="circle left"
    onclick="activate(1)">
    I
    </div>

    <div class="circle right"
    onclick="activate(2)">
    love
    </div>

    <div class="circle bottom"
    onclick="activate(3)">
        <span>you</span>
    </div>

</div>

<script>

const music =
document.getElementById("bgMusic");

const progress =
document.getElementById("progress");

const playBtn =
document.getElementById("playBtn");

let clicked = [false,false,false];
let rosesStarted = false;

function activate(index){

    clicked[index-1] = true;

    document
    .querySelectorAll(".circle")
    [index-1]
    .classList.add("active");

   if(
    clicked.every(c=>c)
){

    document
    .querySelector(".wrapper")
    .classList.add("throb");
       
        if(music.paused){

            music.play();

            playBtn.innerHTML="⏸";

        }

        if(!rosesStarted){

            rosesStarted=true;

            setTimeout(
            startRoseRain,
            5000);

        }
    }
}

function toggleMusic(){

    if(music.paused){

        music.play();

        playBtn.innerHTML="⏸";

    }else{

        music.pause();

        playBtn.innerHTML="▶";

    }
}

music.addEventListener(
"timeupdate",
()=>{

    progress.value =
    (music.currentTime /
    music.duration) * 100 || 0;

    document
    .getElementById("current")
    .textContent =
    formatTime(
      music.currentTime
    );

});

music.addEventListener(
"loadedmetadata",
()=>{

document
.getElementById("duration")
.textContent=
formatTime(
music.duration
);

});

progress.addEventListener(
"input",
()=>{

music.currentTime=
(progress.value/100)
* music.duration;

});

function formatTime(sec){

    let min =
    Math.floor(sec/60);

    let s =
    Math.floor(sec%60);

    if(s<10) s="0"+s;

    return min+":"+s;
}

function createPetal(){

    const petal =
    document.createElement("div");

    petal.className=
    "petal";

    petal.innerHTML=
    "🌹";

    petal.style.left=
    Math.random()*
    window.innerWidth+"px";

    petal.style.fontSize=
    (20+Math.random()*25)
    +"px";

    petal.style.animationDuration=
    (5+Math.random()*4)
    +"s";

    document.body
    .appendChild(petal);

    setTimeout(
    ()=>petal.remove(),
    10000);
}

function startRoseRain(){

    let count=0;

    const rain=
    setInterval(()=>{

        createPetal();

        count++;

        if(count>=420){

            clearInterval(rain);

        }

    },100);
}

</script>

</body>
</html>
