<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For you</title>
<style>
@import url(https://fonts.googleapis.com/css?family=Shadows+Into+Light);

@-webkit-keyframes throb{
  0%{
    -webkit-transform: scale(1);
	}
  35%{
	  -webkit-transform: scale(1.2);
	}
	85%{
	  -webkit-transform: scale(1);
	}		
}

/* Camada da galáxia */
.galaxy{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:1;
    overflow:hidden;
}

/* Estrelas */
.stars{
    position:absolute;
    width:100%;
    height:100%;
    background-image:
        radial-gradient(2px 2px at 20% 30%, white 100%, transparent),
        radial-gradient(1.5px 1.5px at 80% 20%, white 100%, transparent),
        radial-gradient(2px 2px at 40% 80%, white 100%, transparent),
        radial-gradient(1px 1px at 60% 40%, white 100%, transparent),
        radial-gradient(2px 2px at 15% 70%, white 100%, transparent),
        radial-gradient(1px 1px at 90% 60%, white 100%, transparent),
        radial-gradient(2px 2px at 50% 15%, white 100%, transparent),
        radial-gradient(1.5px 1.5px at 70% 90%, white 100%, transparent);
    background-size:300px 300px;
    animation:moveStars 120s linear infinite;
}

/* Piscando */
.twinkling{
    position:absolute;
    width:100%;
    height:100%;
    background-image:
        radial-gradient(2px 2px, rgba(255,255,255,.9), transparent);
    background-size:180px 180px;
    animation:twinkle 3s infinite alternate;
    opacity:.6;
}

/* Nebulosa */
.nebula{
    position:absolute;
    width:100%;
    height:100%;
    background:
      radial-gradient(circle at 20% 20%, rgba(120,0,255,.15), transparent 45%),
      radial-gradient(circle at 80% 70%, rgba(0,150,255,.12), transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(255,0,180,.08), transparent 50%);
    filter:blur(30px);
    animation:nebulaMove 40s ease-in-out infinite alternate;
}

@keyframes twinkle{
    from{
        opacity:.2;
    }
    to{
        opacity:1;
    }
}

@keyframes moveStars{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-300px);
    }
}

@keyframes nebulaMove{
    from{
        transform:scale(1) rotate(0deg);
    }
    to{
        transform:scale(1.2) rotate(8deg);
    }
}

.wrapper{
    position:relative;
    z-index:2;
}	

.petal{
    z-index:9999;
}
	

	
html {
  display: table;
  width: 100%;
  height: 100vmin;
  table-layout: fixed;
}

body {


  display: table-cell;
  vertical-align: bottom;
  font-family: Shadows Into Light;
  color: #fcfafa;

  background-image:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
    url("fundo.jpeg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

.wrapper {
  width: 90vmin;
  height: 90vmin;
  position: relative;
  margin: 5vmin auto;
}

div.throb {
  -webkit-animation: throb 1.5s infinite;
  animation: throb 1.5s infinite;
  animation-delay: 0.8s;
}

input[type="checkbox"] {
  display: none !important;
}

input[type="checkbox"] + label {
  width: 30vmin; height: 30vmin;
  line-height: 30vmin;
  display: inline-block;
  position: absolute;
  font-size: 30vmin;
  text-align: center;
  transition: all 1s ease;
}

label {
  text-shadow: 3vmin 3vmin 10vmin rgba(0,0,0,0.5);
}
  label:hover {
    color: #cf1313;
    cursor: pointer;
  }

#ck1 + label,
#ck2 + label {
  border-radius: 50%;
  top: 0;
}

#ck1:checked + label,
#ck2:checked + label,
#ck3:checked + label {
  background: #cf1313;
  font-size: 0;
  transition: all 1s ease;
}

#ck1 + label {
  left: 0;
}

#ck2 + label {
  right: 10vmin;
}

#ck1:checked + label,
#ck2:checked + label {
  width: 54vmin; height: 54vmin;
  border-radius: 50%;
  line-height: 54vmin;
}

#ck2:checked + label {
  right: 0;
}

#ck3 + label {
  bottom: 5vmin; left: 50%;
  margin: 0 -9vmin;
}

#ck3:checked + label {
  width: 49.5vmin; height: 49.5vmin;
  bottom: 17.28vmin; left: 29.16vmin;
  transform: rotate(45deg);
  line-height: 4.86vmin;
}

span {
  display: inline-block;
  text-align: left;
  position: absolute;
  bottom: 0vmin; left: 0vmin;
  margin-bottom: -3vmin;
  font-size: 6vmin;
  color: #999;
}
/* Pétalas de rosa */

.petal {
  position: fixed;
  top: -50px;
  pointer-events: none;
  z-index: 9999;
  font-size: 24px;
  animation: fall linear forwards;
}

@keyframes fall {

  0% {
    transform:
      translateY(0)
      translateX(0)
      rotate(0deg);
    opacity: 0;
  }

  10% {
    opacity: 1;
  }

  100% {
    transform:
      translateY(110vh)
      translateX(var(--drift))
      rotate(720deg);
    opacity: 0;
  }

}

</style>
</head>
<body>
	
	<div class="galaxy">
    <div class="stars"></div>
    <div class="twinkling"></div>
    <div class="nebula"></div>
</div>

<audio id="bgMusic">
    <source src="Aliança.opus" type="audio/ogg">
</audio>

<br><br>
<form> 
<div class="wrapper">
  <input type="checkbox" id="ck1" onClick="check()"/>
  <label for="ck1">I</label>
  <input type="checkbox" id="ck2" onClick="check()"/>
  <label for="ck2">love</label>
  <input type="checkbox" id="ck3" onClick="check()"/>
  <label for="ck3">you</label>
  <span id="color"></span>
</div>
</form>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
function createPetal() {

  const petal = document.createElement("div");

  petal.className = "petal";

  /* Emoji de rosa */
  petal.innerHTML = "🌹";

  petal.style.left =
    Math.random() * window.innerWidth + "px";

  petal.style.fontSize =
    (18 + Math.random() * 30) + "px";

  petal.style.animationDuration =
    (5 + Math.random() * 4) + "s";

  petal.style.setProperty(
    "--drift",
    (Math.random() * 300 - 150) + "px"
  );

  document.body.appendChild(petal);

  setTimeout(() => {
    petal.remove();
  }, 40000);
}

function startRoseRain() {

  let count = 1;

  const rain = setInterval(() => {

    createPetal();

    count++;

    if (count >= 800) {

  clearInterval(rain);

  const music = document.getElementById("bgMusic");

 music.pause();
	music.currentTime = 0;



}

  }, 150);

}

let rosesStarted = false;

function check() {

  if (
    document.forms[0].elements[0].checked &&
    document.forms[0].elements[1].checked &&
    document.forms[0].elements[2].checked
  ) {

    if (!$('.wrapper').hasClass('throb')) {
      $('.wrapper').addClass('throb');
    }

    if (!rosesStarted) {

      rosesStarted = true;

      const music =
	document.getElementById("bgMusic");

	music.play();



setTimeout(() => {

  startRoseRain();

}, 5000);

    }

  } else {

    if ($('.wrapper').hasClass('throb')) {
      $('.wrapper').removeClass('throb');
    }

    rosesStarted = false;

  }

}
	

</script>

</body>
</html>
